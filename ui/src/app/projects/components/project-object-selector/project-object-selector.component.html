<app-object-selector
  [title]="title()"
  [entries]="objectListEntries() ?? []"
  [loading]="loading()"
  [disabled]="!!error()"
  (opened)="triggerObjectLoadIfNeeded()"
>
  @let err = error();
  @if (err) {
    <button mat-icon-button object-selector-action (click)="$event.stopPropagation(); displayError.emit(err)">
      <mat-icon>error</mat-icon>
    </button>
  }
</app-object-selector>
