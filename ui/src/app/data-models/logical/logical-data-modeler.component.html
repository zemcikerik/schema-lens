<app-layout-content-with-sidebar
  [reverse]="true"
  class="logical-data-modeler"
  appFullscreen
  #fullscreenHost="appFullscreen"
>
  <app-content-card [background]="'dim'" ngProjectAs="sidebar">
    <app-layout-header-and-content [title]="'Properties'" [titleLevel]="'low'">
      <app-logical-er-diagram-properties />
    </app-layout-header-and-content>
  </app-content-card>

  <app-content-card>
    <app-layout-header-and-content [title]="'Hello'">
      <app-logical-data-modeler-actions [diagramHost]="logicalDiagram.diagramHost()" [fullscreenHost]="fullscreenHost" />
      <app-logical-er-diagram #logicalDiagram />
    </app-layout-header-and-content>
  </app-content-card>
</app-layout-content-with-sidebar>
