<app-layout-content-with-sidebar>
  <app-data-model-nav ngProjectAs="sidebar" [dataModelId]="numericDataModelId()"/>

  <app-content-card>
    @if (store.loading()) {
      <app-progress-spinner [center]="true" />
    } @else if (store.error()) {
      <app-alert type="error">{{ ('GENERIC.ERROR_LABEL' | translate)() }}</app-alert>
    } @else {
      <router-outlet />
    }
  </app-content-card>
</app-layout-content-with-sidebar>
