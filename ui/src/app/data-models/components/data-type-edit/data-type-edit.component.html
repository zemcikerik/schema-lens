<app-layout-header-and-content [title]="`${type()?.name} ${('DATA_MODEL.DATA_TYPE.EDIT.TITLE' | translate)()}`" [includeSpacing]="!!error()">
  @if (error()) {
    <app-alert type="error">{{ (error() ?? 'GENERIC.ERROR_LABEL' | translate)() }}</app-alert>
  }
  <form class="data-type-editor" [formGroup]="form" (ngSubmit)="submit()">
    <h4>{{ ('DATA_MODEL.DATA_TYPE.EDIT.PROPERTIES_LABEL' | translate)() }}</h4>

    <div class="data-type-editor__main">
      <mat-form-field>
        <mat-label>{{ ('DATA_MODEL.DATA_TYPE.EDIT.NAME_LABEL' | translate)() }}</mat-label>
        <input matInput required formControlName="name">
        @if (form.controls.name.invalid) {
          <mat-error>{{ (form.errors | formatGenericValidationErrors)() }}</mat-error>
        }
      </mat-form-field>
    </div>

    <div class="data-type-editor__control">
      <button mat-flat-button (click)="delete()" type="button" [disabled]="loading()">
        <mat-icon>delete</mat-icon>
        {{ ('GENERIC.DELETE_LABEL' | translate)() }}
      </button>

      <button mat-flat-button type="submit" [disabled]="loading() || form.invalid">
        <mat-icon>save</mat-icon>
        @if (loading()) {
          <app-progress-spinner [center]="true" size="small"/>
        } @else {
          {{ ('GENERIC.SAVE_LABEL' | translate)() }}
        }
      </button>
    </div>
  </form>
</app-layout-header-and-content>
