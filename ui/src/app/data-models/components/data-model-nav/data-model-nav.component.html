<div class="nav__container">
  <mat-nav-list class="nav">
    <a
      mat-list-item
      [routerLink]="['/model', store.dataModelId, 'properties']"
      routerLinkActive
      #rla="routerLinkActive"
      [activated]="rla.isActive"
      appSidebarClose
    >{{ ('DATA_MODEL.NAV.PROPERTIES' | translate)() }}</a>

    <app-object-selector [title]="('DATA_MODEL.NAV.DIAGRAMS' | translate)()" [entries]="diagramEntries()">
      <button matIconButton object-selector-action (click)="$event.stopPropagation(); addNewDiagram()">
        <mat-icon>add</mat-icon>
      </button>
    </app-object-selector>

    <app-object-selector [title]="('DATA_MODEL.NAV.ENTITIES' | translate)()" [entries]="entityEntries()">
      <button matIconButton object-selector-action (click)="$event.stopPropagation(); addNewEntity()">
        <mat-icon>add</mat-icon>
      </button>
    </app-object-selector>

    <app-object-selector [title]="('DATA_MODEL.NAV.DATA_TYPES' | translate)()" [entries]="dataTypeEntries()">
      <button matIconButton object-selector-action (click)="$event.stopPropagation(); addNewDataType()">
        <mat-icon>add</mat-icon>
      </button>
    </app-object-selector>
  </mat-nav-list>
</div>
