@if (node(); as node) {
  <app-layout-header-and-content [title]="('DATA_MODEL.NODE.$layer.EDIT_TITLE' | dataModelingTranslate: { name: node.name })()">
    <app-data-model-node-editor [node]="node" />

    <app-save-delete-control
      [saveLoading]="updateLoading()"
      [deleteLoading]="deleteLoading()"
      [saveDisabled]="loading()"
      [deleteDisabled]="loading()"
      (save)="updateNode()"
      (delete)="deleteNode()"
    />
  </app-layout-header-and-content>
}
