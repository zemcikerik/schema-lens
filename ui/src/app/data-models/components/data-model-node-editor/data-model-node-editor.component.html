<form class="data-model-node-editor" [formGroup]="form">
  <app-section-header [title]="('DATA_MODEL.NODE.PROPERTIES_LABEL' | translate)()" />

  <mat-form-field class="w-100">
    <mat-label>{{ ('DATA_MODEL.NODE.NAME_LABEL' | translate)() }}</mat-label>
    <input matInput required formControlName="name">
  </mat-form-field>

  <app-section-header [title]="('DATA_MODEL.NODE.FIELDS_LABEL' | translate)()">
    <button
      mat-icon-button
      [id]="addFieldButtonId()"
      [matTooltip]="('DATA_MODEL.NODE.ADD_FIELD_LABEL' | translate)()"
      (click)="addDirectField()"
    >
      <mat-icon>add</mat-icon>
    </button>
  </app-section-header>

  <app-data-model-node-fields-table
    [fields]="fields()"
    [dataTypes]="store.dataTypes()"
    [compact]="compact()"
    (orderChanged)="orderChanged($event)"
    (editDirectField)="editDirectField($event)"
    (deleteDirectField)="deleteDirectField($event)"
    (editEdgeField)="editEdgeField($event)"
    (goToEdge)="goToEdge($event)" />
</form>
