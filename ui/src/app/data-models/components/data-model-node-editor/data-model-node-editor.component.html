<app-layout-header-and-content [title]="node().name + ' Node'">
  <form [formGroup]="nodeForm">
    <h4>Properties</h4>

    <div>
      <mat-form-field>
        <mat-label>Name</mat-label>
        <input matInput required formControlName="name">
      </mat-form-field>
    </div>

    <h4>Fields</h4>
    <app-data-model-node-fields-table
      [nodeId]="node().nodeId"
      (orderChanged)="orderChanged($event)"
      (editDirectField)="editDirectField($event)"
      (deleteDirectField)="deleteDirectField($event)"
      (goToEdge)="onGoToEdge($event)" />
  </form>
</app-layout-header-and-content>
