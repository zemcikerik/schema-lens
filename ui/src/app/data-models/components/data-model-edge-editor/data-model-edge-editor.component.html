<form [formGroup]="form">
  <app-section-header [title]="('DATA_MODEL.EDGE.PROPERTIES_LABEL' | translate)()" />

  <mat-form-field class="w-100">
    <mat-label>{{ ('DATA_MODEL.EDGE.TYPE_LABEL' | translate)() }}</mat-label>
    <mat-select formControlName="type">
      <mat-option [value]="'1:1'">{{ ('DATA_MODEL.EDGE.TYPE_ONE_TO_ONE' | translate)() }}</mat-option>
      <mat-option [value]="'1:N'">{{ ('DATA_MODEL.EDGE.TYPE_ONE_TO_MANY' | translate)() }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-checkbox formControlName="isIdentifying">{{ ('DATA_MODEL.EDGE.IDENTIFYING_LABEL' | translate)() }}</mat-checkbox>
  <mat-checkbox formControlName="isMandatory">{{ ('DATA_MODEL.EDGE.MANDATORY_LABEL' | translate)() }}</mat-checkbox>
</form>
